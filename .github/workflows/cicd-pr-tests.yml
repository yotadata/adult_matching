name: "[CiCd] Ops - PR Test Suite"

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    branches:
      - main
      - develop
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration_tests:
    name: Migration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: sleep 10

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client

      - name: Setup auth schema, roles and extensions
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U user -d test_db -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY,
            email TEXT UNIQUE,
            created_at TIMESTAMPTZ DEFAULT NOW()
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE plpgsql STABLE AS $$
          BEGIN
            RETURN '00000000-0000-0000-0000-000000000000';
          END;
          $$;
          -- Supabase マネージド環境で存在するロールを再現
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role BYPASSRLS;
            END IF;
          END $$;
          SQL

      - name: Apply migrations (in order)
        run: |
          set -euo pipefail
          for f in $(ls -1 supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            PGPASSWORD=password psql -h localhost -p 5432 -U user -d test_db -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Validate DB functions
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U user -d test_db -v ON_ERROR_STOP=1 <<'SQL'
          -- get_videos_recommendations が存在し呼び出せることを確認
          SELECT count(*) FROM public.get_videos_recommendations('00000000-0000-0000-0000-000000000000'::uuid, 10);

          -- get_popular_videos が存在し呼び出せることを確認
          SELECT count(*) FROM public.get_popular_videos(10, 7);

          -- search_videos が存在し呼び出せることを確認
          SELECT count(*) FROM public.search_videos(null, null, null, 10);
          SQL

  function_tests:
    name: Supabase Function Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type check Edge Functions
        run: |
          set -euo pipefail
          if compgen -G "supabase/functions/*/index.ts" > /dev/null; then
            for file in supabase/functions/*/index.ts; do
              echo "Type-checking ${file}"
              deno check "$file"
            done
          else
            echo "No functions found to check"
          fi

  frontend_tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_INTERNAL_URL: http://localhost:54321
      SUPABASE_SERVICE_ROLE_KEY: service_role_test
      SUPABASE_DB_URL: postgresql://user:password@127.0.0.1:5432/test_db
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  discord_notify:
    name: Notify Discord (CI/CD)
    needs: [migration_tests, function_tests, frontend_tests]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            MIG_STATUS=${{ needs.migration_tests.result }}
            FUN_STATUS=${{ needs.function_tests.result }}
            FRT_STATUS=${{ needs.frontend_tests.result }}
            MSG="[CiCd PR Tests] migration=${MIG_STATUS}, functions=${FUN_STATUS}, frontend=${FRT_STATUS}"
            curl -X POST -H "Content-Type: application/json" -d "{\"content\":\"$MSG\"}" "$DISCORD_WEBHOOK_URL"
          fi
