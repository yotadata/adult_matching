name: "[CiCd] Ops - PR Test Suite"

on:
  pull_request:
    types: [labeled]
    branches:
      - main
      - develop
  workflow_dispatch: {}

# ci:run-tests ラベルが付いた場合のみ実行する

permissions:
  contents: read

concurrency:
  group: pr-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration_tests:
    name: Migration Tests
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci:run-tests'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Wait for PostgreSQL
        run: sleep 10

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -q
          sudo apt-get install -y postgresql-client

      - name: Setup auth schema, roles and extensions
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U user -d test_db -v ON_ERROR_STOP=1 <<'SQL'
          CREATE EXTENSION IF NOT EXISTS vector;
          CREATE SCHEMA IF NOT EXISTS auth;
          CREATE TABLE IF NOT EXISTS auth.users (
            id UUID PRIMARY KEY,
            email TEXT UNIQUE,
            raw_user_meta_data JSONB NOT NULL DEFAULT '{}',
            raw_app_meta_data  JSONB NOT NULL DEFAULT '{}',
            created_at TIMESTAMPTZ DEFAULT NOW()
          );
          CREATE OR REPLACE FUNCTION auth.uid() RETURNS uuid LANGUAGE plpgsql STABLE AS $$
          BEGIN
            RETURN '00000000-0000-0000-0000-000000000000';
          END;
          $$;
          -- Supabase マネージド環境で存在するロールを再現
          DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'anon') THEN
              CREATE ROLE anon;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'authenticated') THEN
              CREATE ROLE authenticated;
            END IF;
            IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'service_role') THEN
              CREATE ROLE service_role BYPASSRLS;
            END IF;
          END $$;
          SQL

      - name: Apply migrations (in order)
        run: |
          set -euo pipefail
          for f in $(ls -1 supabase/migrations/*.sql | sort); do
            echo "Applying $f"
            PGPASSWORD=password psql -h localhost -p 5432 -U user -d test_db -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Validate DB functions
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U user -d test_db -v ON_ERROR_STOP=1 <<'SQL'
          -- get_videos_recommendations が存在し呼び出せることを確認
          SELECT count(*) FROM public.get_videos_recommendations('00000000-0000-0000-0000-000000000000'::uuid, 10);

          -- get_popular_videos が存在し呼び出せることを確認（user_uuid, limit_count, lookback_days）
          SELECT count(*) FROM public.get_popular_videos(null::uuid, 10, 7);

          -- search_videos が存在し呼び出せることを確認（p_prompt, p_tag_ids, p_performer_ids, p_limit）
          SELECT count(*) FROM public.search_videos(null::text, null::uuid[], null::uuid[], 10);
          SQL

  function_tests:
    name: Supabase Function Tests
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci:run-tests'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v1.x

      - name: Type check Edge Functions
        run: |
          set -euo pipefail
          if compgen -G "supabase/functions/*/index.ts" > /dev/null; then
            for file in supabase/functions/*/index.ts; do
              echo "Type-checking ${file}"
              deno check --import-map=supabase/functions/import_map.json "$file"
            done
          else
            echo "No functions found to check"
          fi

  frontend_tests:
    name: Frontend Tests
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci:run-tests'
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
      SUPABASE_URL: http://localhost:54321
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_INTERNAL_URL: http://localhost:54321
      SUPABASE_SERVICE_ROLE_KEY: service_role_test
      SUPABASE_DB_URL: postgresql://user:password@127.0.0.1:5432/test_db
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  discord_notify:
    name: Notify Discord (CI/CD)
    needs: [migration_tests, function_tests, frontend_tests]
    if: always() && (github.event_name == 'workflow_dispatch' || github.event.label.name == 'ci:run-tests')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MIG_RESULT: ${{ needs.migration_tests.result }}
          FUN_RESULT: ${{ needs.function_tests.result }}
          FRT_RESULT: ${{ needs.frontend_tests.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          PR_TITLE: ${{ github.event.pull_request.title || github.ref_name }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          status_icon() {
            case "$1" in
              success)  echo "✅" ;;
              failure)  echo "❌" ;;
              skipped)  echo "⏭️" ;;
              *)        echo "⚠️" ;;
            esac
          }
          # 全体ステータスは failure > cancelled > success の優先順位
          OVERALL="success"
          for s in "$MIG_RESULT" "$FUN_RESULT" "$FRT_RESULT"; do
            [ "$s" = "failure"   ] && OVERALL="failure"   && break
            [ "$s" = "cancelled" ] && [ "$OVERALL" != "failure" ] && OVERALL="cancelled"
          done
          if   [ "$OVERALL" = "success"   ]; then COLOR=2278246;  OVERALL_ICON="✅"
          elif [ "$OVERALL" = "failure"   ]; then COLOR=15682074; OVERALL_ICON="❌"
          else                                    COLOR=16032867; OVERALL_ICON="⚠️"; fi
          SHORT_SHA="${SHA:0:7}"
          MIG_VAL="$(status_icon "$MIG_RESULT") ${MIG_RESULT}"
          FUN_VAL="$(status_icon "$FUN_RESULT") ${FUN_RESULT}"
          FRT_VAL="$(status_icon "$FRT_RESULT") ${FRT_RESULT}"
          jq -n \
            --arg title   "PR Test Suite" \
            --arg url     "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg overall "${OVERALL_ICON} ${OVERALL}" \
            --arg branch  "$REF_NAME" \
            --arg actor   "$ACTOR" \
            --arg commit  "$SHORT_SHA" \
            --arg pr      "$PR_TITLE" \
            --arg mig     "$MIG_VAL" \
            --arg fun     "$FUN_VAL" \
            --arg frt     "$FRT_VAL" \
            '{embeds:[{title:$title,url:$url,color:$color,fields:[
              {name:"Overall",    value:$overall, inline:true},
              {name:"Branch",     value:$branch,  inline:true},
              {name:"Actor",      value:$actor,   inline:true},
              {name:"PR",         value:$pr,      inline:false},
              {name:"Migration",  value:$mig,     inline:true},
              {name:"Functions",  value:$fun,     inline:true},
              {name:"Frontend",   value:$frt,     inline:true}
            ],timestamp:(now|todate)}]}' \
          | curl -fsSL -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"
