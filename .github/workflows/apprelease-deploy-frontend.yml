name: "[AppRelease] Ops - Deploy Frontend to Vercel"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment (production or preview)'
        required: false
        default: 'production'
        type: choice
        options:
          - production
          - preview

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment (prod)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Pull Vercel environment (dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Pull Vercel environment (preview)
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'preview'
        run: vercel pull --yes --environment=preview --token "$VERCEL_TOKEN"

      - name: Build (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'production')
        run: vercel build --prod --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Build (preview)
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'preview'
        run: vercel build --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy to Vercel (prod)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy to Vercel (dispatch prod)
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'production'
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy to Vercel (dispatch preview)
        if: github.event_name == 'workflow_dispatch' && inputs.environment == 'preview'
        run: vercel deploy --prebuilt --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Output preview/prod URL
        run: |
          echo "If previous step succeeded, Vercel printed the deployment URL."
        shell: bash

      - name: Notify Discord (Frontend Deploy)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          ENVIRONMENT: ${{ inputs.environment || 'production' }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          if   [ "$JOB_STATUS" = "success" ]; then COLOR=2278246;  ICON="✅"
          elif [ "$JOB_STATUS" = "failure" ]; then COLOR=15682074; ICON="❌"
          else                                     COLOR=16032867; ICON="⚠️"; fi
          SHORT_SHA="${SHA:0:7}"
          jq -n \
            --arg title  "Frontend Deploy" \
            --arg url    "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg status "${ICON} ${JOB_STATUS}" \
            --arg env    "$ENVIRONMENT" \
            --arg branch "$REF_NAME" \
            --arg actor  "$ACTOR" \
            --arg commit "$SHORT_SHA" \
            '{embeds:[{title:$title,url:$url,color:$color,fields:[
              {name:"Status",      value:$status, inline:true},
              {name:"Environment", value:$env,    inline:true},
              {name:"Branch",      value:$branch, inline:true},
              {name:"Actor",       value:$actor,  inline:true},
              {name:"Commit",      value:$commit, inline:true}
            ],timestamp:(now|todate)}]}' \
          | curl -fsSL -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"

    # Notes:
    # - Configure repo secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
    # - This workflow relies on Vercel Git integration or project linking via 'vercel pull'.
