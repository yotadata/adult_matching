name: "[CiCd] Ops - Deploy Supabase Edge Functions"

on:
  workflow_dispatch:
    inputs:
      function:
        description: 'Function name to deploy (leave empty or "all" to deploy all)'
        required: false
        default: 'all'

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.106.0

      - name: Link project
        working-directory: supabase
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy all functions (push)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/ ; do
            fname=$(basename "$dir")
            echo "Deploying function: $fname"
            supabase functions deploy "$fname" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Deploy selected function (dispatch)
        if: github.event_name == 'workflow_dispatch' && inputs.function != '' && inputs.function != 'all'
        run: |
          set -euo pipefail
          echo "Deploying function: ${INPUT_FUNCTION:-${{ inputs.function }}}"
          supabase functions deploy "${{ inputs.function }}" --project-ref "$SUPABASE_PROJECT_ID"

      - name: Deploy all functions (dispatch)
        if: github.event_name == 'workflow_dispatch' && (inputs.function == '' || inputs.function == 'all')
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/ ; do
            fname=$(basename "$dir")
            echo "Deploying function: $fname"
            supabase functions deploy "$fname" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Notify Discord (Functions Deploy)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          FUNCTION_NAME: ${{ inputs.function || 'all' }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          if   [ "$JOB_STATUS" = "success" ]; then COLOR=2278246;  ICON="✅"
          elif [ "$JOB_STATUS" = "failure" ]; then COLOR=15682074; ICON="❌"
          else                                     COLOR=16032867; ICON="⚠️"; fi
          SHORT_SHA="${SHA:0:7}"
          jq -n \
            --arg title    "Edge Functions Deploy" \
            --arg url      "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg status   "${ICON} ${JOB_STATUS}" \
            --arg func     "$FUNCTION_NAME" \
            --arg branch   "$REF_NAME" \
            --arg actor    "$ACTOR" \
            --arg commit   "$SHORT_SHA" \
            '{embeds:[{title:$title,url:$url,color:$color,fields:[
              {name:"Status",   value:$status, inline:true},
              {name:"Function", value:$func,   inline:true},
              {name:"Branch",   value:$branch, inline:true},
              {name:"Actor",    value:$actor,  inline:true},
              {name:"Commit",   value:$commit, inline:true}
            ],timestamp:(now|todate)}]}' \
          | curl -fsSL -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"

    # Notes:
    # - Configure repo secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD
    # - Uses `supabase link` with non-interactive token for CI.
