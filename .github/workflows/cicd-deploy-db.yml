name: "[CiCd] Sub - Deploy DB Migrations"

on:
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply migrations to remote (type "yes" to confirm)'
        required: true
        default: 'no'
      target:
        description: 'Target project ref (defaults to SUPABASE_PROJECT_ID secret)'
        required: false
        default: ''

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        working-directory: supabase
        run: |
          PROJECT_REF=${{ inputs.target != '' && inputs.target || env.SUPABASE_PROJECT_ID }}
          echo "Linking to project: $PROJECT_REF"
          supabase link --project-ref "$PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Repair remote-only migrations
        working-directory: supabase
        run: |
          # ダッシュボード経由でリモートに直接適用されローカルに存在しないマイグレーションを
          # "reverted" としてマークし、db push の整合性エラーを回避する。
          for v in 20260517020453 20260517020512 20260517020530 20260517111741 \
                   20260530062212 20260530093048 \
                   20260610034501 20260610035922 20260610040525 20260610040539 \
                   20260611003815 20260611004041 20260611005634 \
                   20260611053235 20260611060628 20260611060719 20260611061135 \
                   20260611065322 20260611065430 20260611070945 20260611071413 \
                   20260611071533 20260611071726 20260611072253 20260611072739 \
                   20260611095548 20260611095549 \
                   20260611095605 20260611100810 \
                   20260611115320 \
                   20260611120426 20260611120427; do
            supabase migration repair --status reverted "$v" || true
          done

      - name: Push migrations (push to main)
        if: github.event_name == 'push'
        working-directory: supabase
        run: supabase db push --include-all

      - name: Confirm apply flag (dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ inputs.apply }}" != "yes" ]; then
            echo "Refusing to apply migrations without confirmation (set input 'apply' to 'yes')." >&2
            exit 1
          fi

      - name: Push migrations (dispatch)
        if: github.event_name == 'workflow_dispatch'
        working-directory: supabase
        run: |
          PROJECT_REF=${{ inputs.target != '' && inputs.target || env.SUPABASE_PROJECT_ID }}
          echo "Applying migrations to: $PROJECT_REF"
          supabase db push --include-all

      - name: Notify Discord (DB Deploy)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          SHA: ${{ github.sha }}
          TARGET: ${{ inputs.target || secrets.SUPABASE_PROJECT_ID }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          if   [ "$JOB_STATUS" = "success" ]; then COLOR=2278246;  ICON="✅"
          elif [ "$JOB_STATUS" = "failure" ]; then COLOR=15682074; ICON="❌"
          else                                     COLOR=16032867; ICON="⚠️"; fi
          SHORT_SHA="${SHA:0:7}"
          jq -n \
            --arg title  "DB Migrations Deploy" \
            --arg url    "$RUN_URL" \
            --argjson color "$COLOR" \
            --arg status "${ICON} ${JOB_STATUS}" \
            --arg target "$TARGET" \
            --arg branch "$REF_NAME" \
            --arg actor  "$ACTOR" \
            --arg commit "$SHORT_SHA" \
            '{embeds:[{title:$title,url:$url,color:$color,fields:[
              {name:"Status",  value:$status, inline:true},
              {name:"Target",  value:$target, inline:true},
              {name:"Branch",  value:$branch, inline:true},
              {name:"Actor",   value:$actor,  inline:true},
              {name:"Commit",  value:$commit, inline:true}
            ],timestamp:(now|todate)}]}' \
          | curl -fsSL -X POST -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK_URL"

    # Notes:
    # - Configure repo secrets: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_ID, SUPABASE_DB_PASSWORD
    # - Uses 'supabase db push' to apply migrations in supabase/migrations to the linked project.
