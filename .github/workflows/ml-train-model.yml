name: "[ML] Train TwoTower Model"

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "任意の識別子（省略時は UTC timestamp）"
        required: false
      mode:
        description: "データ準備モード（explicit/reviews）"
        required: false
        default: reviews
      min_stars:
        description: "明示レビューを正例とみなす最小 star"
        required: false
        default: '4'
      neg_per_pos:
        description: "positive 1件あたりの負例数"
        required: false
        default: '3'
      runner_label:
        description: "Runner label (例: self-hosted-ipv6, 未指定なら ubuntu-latest)"
        required: false
  schedule:
    - cron: '0 4 * * 0'

jobs:
  prepare:
    name: Prepare dataset
    runs-on: ${{ github.event.inputs.runner_label != '' && github.event.inputs.runner_label || 'ubuntu-latest' }}
    env:
      PYTHONUNBUFFERED: '1'
      REMOTE_DATABASE_URL: ${{ secrets.REMOTE_DATABASE_URL }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_REGION: ${{ secrets.SUPABASE_REGION }}
    outputs:
      run_id: ${{ steps.compute_run_id.outputs.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install prep dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/prep_two_tower/requirements.txt

      - name: Determine run id
        id: compute_run_id
        run: |
          if [ -n "${{ github.event.inputs.run_id }}" ]; then
            RID="${{ github.event.inputs.run_id }}"
          else
            RID=$(date -u +'%Y%m%dT%H%M%SZ')
          fi
          echo "run_id=$RID" >> "$GITHUB_OUTPUT"
          echo "RUN_ID=$RID" >> "$GITHUB_ENV"

      - name: Build pooler DB URL
        run: |
          # Supabase セッションプーラー (IPv4 対応) の接続 URL を構築する
          # REMOTE_DATABASE_URL: postgresql://postgres:<pass>@db.<ref>.supabase.co:5432/postgres
          DB_PASS=$(python3 -c "
          from urllib.parse import urlparse
          import os
          print(urlparse(os.environ['REMOTE_DATABASE_URL']).password)
          ")
          POOLER_URL="postgresql://postgres.${SUPABASE_PROJECT_ID}:${DB_PASS}@${SUPABASE_REGION}.pooler.supabase.com:5432/postgres?sslmode=require"
          echo "POOLER_DATABASE_URL=${POOLER_URL}" >> "$GITHUB_ENV"
          echo "Pooler URL constructed (password masked)"

      - name: Merge review CSVs
        run: |
          python3 -c "
          import pandas as pd
          df1 = pd.read_csv('ml/data/raw/reviews/dmm_reviews_2025-10-04.csv', usecols=['product_url','reviewer_id','stars'])
          df2 = pd.read_csv('ml/data/raw/reviews/dmm_reviews_videoa_2025-10-04.csv', usecols=['product_url','reviewer_id','stars'])
          merged = pd.concat([df1, df2], ignore_index=True).drop_duplicates()
          merged.to_csv('ml/data/raw/reviews/dmm_reviews_merged.csv', index=False)
          print(f'Merged {len(merged)} rows')
          "

      - name: Prepare dataset
        run: |
          MODE="${{ github.event.inputs.mode || 'reviews' }}"
          MIN_STARS="${{ github.event.inputs.min_stars || '4' }}"
          NEG_PER_POS="${{ github.event.inputs.neg_per_pos || '3' }}"

          python scripts/prep_two_tower/prep_two_tower_dataset.py \
            --db-url "$POOLER_DATABASE_URL" \
            --mode "$MODE" \
            --input ml/data/raw/reviews/dmm_reviews_merged.csv \
            --popularity-csv ml/data/raw/reviews/dmm_reviews_2025-10-04.csv \
            --popularity-csv ml/data/raw/reviews/dmm_reviews_videoa_2025-10-04.csv \
            --min-stars "$MIN_STARS" \
            --neg-per-pos "$NEG_PER_POS" \
            --run-id "$RUN_ID"

      - name: Upload prepared data
        uses: actions/upload-artifact@v4
        with:
          name: prepared-two-tower
          path: ml/data/processed/two_tower/latest

  train:
    name: Train model
    runs-on: ${{ github.event.inputs.runner_label != '' && github.event.inputs.runner_label || 'ubuntu-latest' }}
    needs: prepare
    env:
      PYTHONUNBUFFERED: '1'
      RUN_ID: ${{ needs.prepare.outputs.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared data
        uses: actions/download-artifact@v4
        with:
          name: prepared-two-tower
          path: ml/data/processed/two_tower/latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/train_two_tower/requirements.txt

      - name: Train TwoTower
        run: |
          bash scripts/train_two_tower/run.sh \
            --run-id "$RUN_ID" \
            --train ml/data/processed/two_tower/latest/interactions_train.parquet \
            --val ml/data/processed/two_tower/latest/interactions_val.parquet \
            --user-features ml/data/processed/two_tower/latest/user_features.parquet \
            --item-features ml/data/processed/two_tower/latest/item_features.parquet \
            --item-key video_id \
            --embedding-dim 128 \
            --hidden-dim 512 \
            --epochs 5 \
            --batch-size 2048 \
            --lr 1e-3

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: two_tower_model
          path: ml/artifacts/runs

  evaluate:
    name: Evaluate model
    runs-on: ${{ github.event.inputs.runner_label != '' && github.event.inputs.runner_label || 'ubuntu-latest' }}
    needs: [prepare, train]
    env:
      PYTHONUNBUFFERED: '1'
      RUN_ID: ${{ needs.prepare.outputs.run_id }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_REGION: ${{ secrets.SUPABASE_REGION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download prepared data
        uses: actions/download-artifact@v4
        with:
          name: prepared-two-tower
          path: ml/data/processed/two_tower/latest

      - name: Download trained artifacts
        uses: actions/download-artifact@v4
        with:
          name: two_tower_model
          path: ml/artifacts/runs

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/train_two_tower/requirements.txt

      - name: Evaluate
        run: |
          bash scripts/eval_two_tower/run.sh \
            --run-id "$RUN_ID" \
            --val ml/data/processed/two_tower/latest/interactions_val.parquet \
            --recall-k 20
        continue-on-error: false

      - name: Upload evaluation artifact
        uses: actions/upload-artifact@v4
        with:
          name: two_tower_eval
          path: ml/artifacts/runs

      - name: Prepare env file for Storage upload
        run: |
          mkdir -p docker/env
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
            echo "SUPABASE_PROJECT_ID=${SUPABASE_PROJECT_ID}"
            echo "SUPABASE_REGION=${SUPABASE_REGION}"
          } > docker/env/prd.ci.env

      - name: Upload model to Supabase Storage
        run: |
          ARTIFACTS_DIR="ml/artifacts/runs/${RUN_ID}"
          bash scripts/publish_two_tower/run.sh --env-file docker/env/prd.ci.env \
            upload --artifacts-dir "$ARTIFACTS_DIR" --run-id "$RUN_ID"

      - name: Notify Discord (train)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            STATUS="✅ Success"
            if [ "${{ job.status }}" != "success" ]; then
              STATUS="❌ Failed"
            fi
            curl -X POST -H "Content-Type: application/json" -d "
            {
              \"content\": \"[TwoTower Train] $STATUS\\nRun ID: $RUN_ID\"
            }
            " "$DISCORD_WEBHOOK_URL"
          fi
