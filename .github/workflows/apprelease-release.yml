name: "[AppRelease] Ops - Release Pipeline"

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment (production only supported)'
        required: false
        default: 'production'

jobs:
  db_migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        working-directory: supabase
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Repair failed migrations
        working-directory: supabase
        run: |
          for v in 20260517020453 20260517020512 20260517020530 20260517111741 20260518100000 20260518200000 20260518300000 20260518400000; do
            supabase migration repair --status reverted "$v" || true
          done

      - name: Push migrations
        working-directory: supabase
        run: supabase db push --include-all

  functions_deploy:
    name: Deploy Supabase Functions
    needs: db_migrate
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: latest

      - name: Link project
        working-directory: supabase
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"

      - name: Deploy all functions
        run: |
          set -euo pipefail
          if compgen -G "supabase/functions/*/" > /dev/null; then
            for dir in supabase/functions/*/ ; do
              fname=$(basename "$dir")
              echo "Deploying function: $fname"
              supabase functions deploy "$fname" --project-ref "$SUPABASE_PROJECT_ID"
            done
          else
            echo "No functions directory found"
          fi

  frontend_deploy:
    name: Deploy Frontend to Vercel
    needs: functions_deploy
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel env (production)
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build (production)
        run: vercel build --prod --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Deploy (production)
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  notify:
    name: Notify Discord (Release Pipeline)
    needs: [db_migrate, functions_deploy, frontend_deploy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            DB="${{ needs.db_migrate.result }}"
            FUNCTIONS="${{ needs.functions_deploy.result }}"
            FRONTEND="${{ needs.frontend_deploy.result }}"

            icon() { [ "$1" = "success" ] && echo "✅" || echo "❌"; }
            DB_ICON=$(icon "$DB")
            FUNCTIONS_ICON=$(icon "$FUNCTIONS")
            FRONTEND_ICON=$(icon "$FRONTEND")

            if [ "$DB" = "success" ] && [ "$FUNCTIONS" = "success" ] && [ "$FRONTEND" = "success" ]; then
              COLOR=3066993
              TITLE="🚀 Release 完了"
            else
              COLOR=15158332
              TITLE="⚠️ Release 一部失敗"
            fi

            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

            PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "${TITLE}",
              "color": ${COLOR},
              "fields": [
                { "name": "DB migrate", "value": "${DB_ICON} ${DB}", "inline": true },
                { "name": "Functions", "value": "${FUNCTIONS_ICON} ${FUNCTIONS}", "inline": true },
                { "name": "Frontend", "value": "${FRONTEND_ICON} ${FRONTEND}", "inline": true }
              ],
              "footer": { "text": "GitHub Actions" },
              "url": "${RUN_URL}"
            }]
          }
          EOF
            )
            curl -X POST -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL"
          fi
