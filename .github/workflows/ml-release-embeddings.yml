name: "[ML] Release TwoTower Embeddings"

on:
  workflow_dispatch:
    inputs:
      approved:
        description: "評価済みか。true で埋め込み反映を実行"
        required: true
        default: 'false'
        type: boolean
      run_id:
        description: "リリースする train の run_id（ml-train-model で出力されたもの）"
        required: true
      lookback_days:
        description: "VIDEO 埋め込み生成の遡り日数"
        required: false
        default: '3'
      recent_hours:
        description: "ユーザー埋め込みの対象となる直近何時間"
        required: false
        default: '8'

jobs:
  release:
    name: Activate & Sync Embeddings
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.approved == 'true' }}
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_SERVICE_ROLE_JWT_AUDIENCE: authenticated
      REMOTE_DATABASE_URL: ${{ secrets.REMOTE_DATABASE_URL }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_REGION: ${{ secrets.SUPABASE_REGION }}
      FANZA_API_ID: ${{ secrets.FANZA_API_ID }}
      FANZA_API_AFFILIATE_ID: ${{ secrets.FANZA_API_AFFILIATE_ID }}
      FANZA_LINK_AFFILIATE_ID: ${{ secrets.FANZA_LINK_AFFILIATE_ID }}
      SUPABASE_CA_CERT: ${{ secrets.SUPABASE_CA_CERT }}
      RELEASE_RUN_ID: ${{ github.event.inputs.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime env
        run: |
          mkdir -p docker/env
          {
            echo "SUPABASE_URL=${SUPABASE_URL}"
            echo "NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL}"
            echo "SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-${NEXT_PUBLIC_SUPABASE_ANON_KEY}}"
            echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:-${SUPABASE_ANON_KEY}}"
            echo "SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}"
            echo "SUPABASE_PROJECT_ID=${SUPABASE_PROJECT_ID}"
            echo "SUPABASE_REGION=${SUPABASE_REGION}"
            echo "REMOTE_DATABASE_URL=${REMOTE_DATABASE_URL}"
            echo "SUPABASE_DB_URL=${REMOTE_DATABASE_URL}"
            echo "SUPABASE_SERVICE_ROLE_JWT_AUDIENCE=authenticated"
            echo "FANZA_API_ID=${FANZA_API_ID}"
            echo "FANZA_API_AFFILIATE_ID=${FANZA_API_AFFILIATE_ID}"
            echo "FANZA_LINK_AFFILIATE_ID=${FANZA_LINK_AFFILIATE_ID}"
            echo "PGSSLMODE=require"
          } > docker/env/prd.ci.env
          if [ -n "${SUPABASE_CA_CERT}" ]; then
            echo "${SUPABASE_CA_CERT}" | base64 -d > docker/env/supabase-ca.crt
            {
              echo "PGSSLROOTCERT=docker/env/supabase-ca.crt"
              echo "sslmode=require"
              echo "sslrootcert=docker/env/supabase-ca.crt"
            } >> docker/env/prd.ci.env
          else
            echo "sslmode=require" >> docker/env/prd.ci.env
          fi

      - name: Activate model manifest
        run: |
          bash scripts/publish_two_tower/run.sh --env-file docker/env/prd.ci.env \
            activate --run-id "$RELEASE_RUN_ID"

      - name: Sync video embeddings
        env:
          SYNC_VIDEO_ENV_FILE: docker/env/prd.ci.env
          SYNC_VIDEO_LOOKBACK_DAYS: ${{ github.event.inputs.lookback_days }}
        run: |
          bash scripts/sync_video_embeddings/run.sh \
            --skip-ingest \
            --lookback-days "${SYNC_VIDEO_LOOKBACK_DAYS}"

      - name: Sync user embeddings
        env:
          SYNC_USER_ENV_FILE: docker/env/prd.ci.env
          SYNC_USER_RUN_ID: "${{ github.run_id }}-${{ github.run_attempt }}"
        run: |
          bash scripts/sync_user_embeddings/run.sh \
            --run-id "$SYNC_USER_RUN_ID" \
            --recent-hours "${{ github.event.inputs.recent_hours }}"

      - name: Notify Discord (release)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          if [ "$JOB_STATUS" = "success" ]; then ICON="✅"; else ICON="❌"; fi
          curl -fsSL -X POST -H "Content-Type: application/json" \
            -d "{\"content\":\"${ICON} TwoTower Release: ${JOB_STATUS} run_id=${RELEASE_RUN_ID} <${RUN_URL}>\"}" \
            "$DISCORD_WEBHOOK_URL"
