name: "[X] Generate Tweet Drafts"

on:
  schedule:
    # 9時・14時・20時 JST (UTC+9) → 0時・5時・11時 UTC
    - cron: "0 0 * * *"
    - cron: "0 5 * * *"
    - cron: "0 11 * * *"
  workflow_dispatch:
    inputs:
      count:
        description: "生成する動画数"
        default: "3"
        required: false
      mode:
        description: "recent or popular"
        default: "recent"
        required: false

jobs:
  gen-tweet:
    name: Generate Tweet Drafts & Notify Discord
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd scripts/gen_tweet
          pip install --no-cache-dir -r requirements.txt

      - name: Run gen_tweet
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          FANZA_AFFILIATE_ID: ${{ secrets.FANZA_AFFILIATE_ID }}
        run: |
          COUNT="${{ github.event.inputs.count || '3' }}"
          MODE="${{ github.event.inputs.mode || 'recent' }}"
          cd scripts/gen_tweet
          python gen_tweet.py --count "$COUNT" --mode "$MODE"
